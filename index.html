<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIROS UNBLOCKER</title>
    <style>
        /* Base styles and purple gradient background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2e0854, #8a2be2, #4b0082);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Container card */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
        }

        #status {
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            color: #dda0dd;
        }

        /* The dynamic button container */
        #button-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Styling for the generated buttons */
        .unblocker-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .unblocker-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .unblocker-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VIROS UNBLOCKER</h1>
        <div id="status">Status: Initializing request...</div>
        
        <!-- This is where the JS will inject your buttons -->
        <div id="button-list"></div>
    </div>

    <script>
        // Your raw GitHub JSON URL
        const jsonUrl = "https://githubusercontent.com";
        
        const statusDiv = document.getElementById('status');
        const buttonListDiv = document.getElementById('button-list');

        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok: ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                // Assuming your JSON contains an array of objects
                if (Array.isArray(data)) {
                    statusDiv.textContent = `Successfully loaded ${data.length} unblockers!`;
                    statusDiv.style.color = "#a3e635"; // Green success text
                    
                    // Loop through each item in your JSON file
                    data.forEach(item => {
                        // Create a link element styled as a button
                        const btn = document.createElement('a');
                        btn.className = 'unblocker-btn';
                        
                        // Set the destination URL from the JSON "link" property
                        btn.href = item.link;
                        
                        // Open in a new tab so users don't lose your dashboard
                        btn.target = "_blank"; 
                        
                        // Set the text from the JSON "name" property
                        btn.textContent = item.name || "Unnamed Link";
                        
                        // Append the button to the list
                        buttonListDiv.appendChild(btn);
                    });
                } else {
                    // Fallback if the JSON isn't an array but a single object
                    statusDiv.textContent = "Data loaded, but it's not a list format.";
                }
            })
            .catch(error => {
                console.error('Error fetching the data:', error);
                statusDiv.textContent = "Failed to load (Link might be private or broken)";
                statusDiv.style.color = "#ff6b6b"; // Red error text
            });
    </script>

</body>
</html>
