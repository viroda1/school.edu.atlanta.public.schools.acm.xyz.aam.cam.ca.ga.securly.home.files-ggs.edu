<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIROS UNBLOCKER</title>
    <style>
        /* Darker, deeper gradient background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Container with a darker "Glass" effect */
        .container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        #status {
            font-size: 0.85rem;
            margin-bottom: 2rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #button-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Dark themed buttons */
        .unblocker-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #eee;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: block;
        }

        .unblocker-btn:hover {
            background: rgba(138, 43, 226, 0.2); /* Subtle purple glow on hover */
            border-color: #8a2be2;
            transform: scale(1.02);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VIROS UNBLOCKER</h1>
        <div id="status">System Online</div>
        <div id="button-list"></div>
    </div>

    <script>
        // ADD NEW LINKS HERE: Just copy/paste a block and change the name/link
        const links = [
          {
            "name": "HENRYBASS",
            "link": "https://github.io"
          }
        ];

        const buttonList = document.getElementById('button-list');

        // Draw buttons immediately from the list above
        links.forEach(item => {
            const btn = document.createElement('a');
            btn.className = 'unblocker-btn';
            btn.href = item.link;
            btn.target = "_blank"; 
            btn.textContent = item.name;
            buttonList.appendChild(btn);
        });
    </script>

</body>
</html>
