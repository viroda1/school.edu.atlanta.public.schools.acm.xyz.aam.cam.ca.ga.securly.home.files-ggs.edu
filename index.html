<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIROS UNBLOCKER</title>
    <style>
        /* Base styles and purple gradient background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2e0854, #8a2be2, #4b0082);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        /* Container card */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        #status {
            font-size: 0.9rem;
            margin-top: 1.5rem;
            color: #dda0dd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VIROS UNBLOCKER</h1>
        <p>Fetching files and loading network proxies...</p>
        <div id="status">Status: Initializing request...</div>
    </div>

    <script>
        // Fetching the unblockers JSON data from the GitHub repository
        const jsonUrl = "https://raw.githubusercontent.com/viroda1/school.edu.atlanta.public.schools.acm.xyz.aam.cam.ca.ga.securly.home.files-ggs.edu/refs/heads/main/unblovkers.json";
        const statusDiv = document.getElementById('status');

        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok: ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                console.log('Successfully loaded unblockers:', data);
                statusDiv.textContent = "Status: Successfully connected to repository!";
                // You can map and display your JSON array data here
            })
            .catch(error => {
                console.error('Error fetching the data:', error);
                statusDiv.textContent = "Status: Failed to load (Link might be private or broken)";
                statusDiv.style.color = "#ff6b6b";
            });
    </script>

</body>
</html>
